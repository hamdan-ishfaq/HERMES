services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes_pass
      POSTGRES_DB: hermes_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"   # REST + dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  # Optional local LLM/embedding server. Enable with:
  #   docker compose --profile local up -d
  ollama:
    image: ollama/ollama
    profiles: ["local"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_data:
