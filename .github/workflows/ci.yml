name: Hermes CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: hermes
          POSTGRES_PASSWORD: hermes_pass
          POSTGRES_DB: hermes_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://hermes:hermes_pass@localhost:5432/hermes_db
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: ci_test_secret_key_32_characters_x
      QDRANT_URL: http://localhost:6333
      OLLAMA_API_BASE: http://localhost:11434

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        # Integration tests (real Qdrant/Ollama) are excluded from CI.
        run: uv run pytest tests/ -v --tb=short -m "not integration"
