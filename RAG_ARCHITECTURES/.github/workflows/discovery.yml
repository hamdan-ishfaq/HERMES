name: Weekly RAG Discovery

on:
  schedule:
    # Every Monday at 06:00 UTC (09:00 Istanbul time, UTC+3).
    - cron: '0 6 * * 1'
  workflow_dispatch: # Also triggerable manually via the Actions UI.

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: read      # checkout only
      issues: write       # post discovery comment on tracking issue

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Discovery Engine
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/discovery_engine.py

      - name: Post Results to Tracking Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          REPORT_FILE=".github/PROPOSED_UPDATES.md"
          if [ ! -f "$REPORT_FILE" ]; then
            echo "No report file found — discovery may have failed. Check logs."
            exit 0
          fi

          BODY=$(cat "$REPORT_FILE")

          # Ensure the tracking label exists (idempotent — no-op if already present).
          gh label create "discovery-feed" \
            --repo "$GH_REPO" \
            --description "Long-lived issue receiving weekly RAG discovery results" \
            --color "0E8A16" \
            --force

          # Find or create the long-lived tracking issue (label: discovery-feed).
          ISSUE_NUM=$(gh issue list \
            --repo "$GH_REPO" \
            --label "discovery-feed" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$ISSUE_NUM" ]; then
            ISSUE_NUM=$(gh issue create \
              --repo "$GH_REPO" \
              --title "Weekly RAG Discovery Feed" \
              --label "discovery-feed" \
              --body "This issue receives automated weekly RAG discovery results. Each Monday a new comment is added with trending repositories and any stale benchmark citations detected in \`benchmarks.md\`.")
            # gh issue create returns the URL; extract the number.
            ISSUE_NUM=$(echo "$ISSUE_NUM" | grep -oE '[0-9]+$')
          fi

          gh issue comment "$ISSUE_NUM" \
            --repo "$GH_REPO" \
            --body "$BODY"
