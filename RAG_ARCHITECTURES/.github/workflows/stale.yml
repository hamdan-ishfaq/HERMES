name: Stale

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10.3.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: "This issue hasn't seen any activity for 60 days. To keep the focus on active development, I'm marking it as stale. If this is still relevant, please leave a comment."
          stale-pr-message: "This PR has been quiet for 60 days. If you're still working on this, please let us know — otherwise it will be closed in 7 days."
          stale-issue-label: 'no-issue-activity'
          stale-pr-label: 'no-pr-activity'
          exempt-issue-labels: 'discovery-feed'
          days-before-stale: 60
          days-before-close: 7
