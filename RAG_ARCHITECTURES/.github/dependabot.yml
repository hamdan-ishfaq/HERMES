version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    # Bundle all action updates into a single weekly PR instead of one per action
    groups:
      github-actions:
        patterns: ["*"]
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"

  - package-ecosystem: "pip"
    directory: "/scripts"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
